<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Patch'd | Welcome</title>
  <link rel="manifest" href="/manifest.json">

  <script>
    if("serviceWorker" in navigator){
        navigator.serviceWorker.register("/sw.js")
        .then(()=>console.log("Service Worker registered"));
    }
    </script>

  <!-- site theme -->
  <link rel="stylesheet" href="assets/styles/Home.css">
  <link rel="stylesheet" href="assets/styles/Index.css">
  <link rel="stylesheet" href="assets/styles/Transition.css">
  

  <!-- Icons + Fonts -->
  <script src="https://kit.fontawesome.com/d78d9832b3.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+DK+Uloopet+Guides&family=Playwrite+DK+Uloopet:wght@100..400&display=swap" rel="stylesheet">



</head>

<body class="indexPage">

  <header class="indexHeader" role="banner">
    <div class="logo" aria-hidden="true"><span>Patch'd</span></div>
    <nav class="social">
      <a href="https://instagram.com" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com" aria-label="Facebook" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a>
    </nav>
  </header>

  <main class="indexHero" role="main">
    <div class="indexContent container">
      <h1 class="brandTitle"><span class="brandBox">Patch'd</span></h1>
      <p class="tagline">Built for those who refuse to blend in.</p>
      <div class="actions">
        <a class="btn btn--primary" href="/src/pages/Home.html" aria-label="Enter site">Enter</a>
        <a class="btn btn--ghost" href="/src/pages/Shop.html" aria-label="Visit shop">Shop</a>
      </div>
    </div>
    <div class="indexCredit">Follow @patchd</div>
  </main>

  <footer class="indexFooter" role="contentinfo">
    <small>© <span id="year"></span> Patch'd</small>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    document.addEventListener('keydown', e => { if (e.key === 'Enter') location.href = '/'; });
  </script>
</body>
</html>
